# 로컬 개발용 구성입니다. MySQL 을 함께 띄워 RDS 없이 개발할 수 있습니다.
# 사용법: docker compose up -d --build
services:
  mysql:
    image: mysql:8.0
    container_name: pictree-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-pictree2026}
      MYSQL_DATABASE: ${DB_NAME:-pictree_db}
      MYSQL_USER: ${DB_USER:-pictree}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pictree2026}
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pictree-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 컨테이너 간 통신은 서비스명(mysql)으로 합니다. .env 의 DATABASE_URL 을 덮어씁니다.
      DATABASE_URL: mysql://${DB_USER:-pictree}:${DB_PASSWORD:-pictree2026}@mysql:3306/${DB_NAME:-pictree_db}
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
